<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%23f0b429'/><text x='90' y='130' text-anchor='middle' font-size='120' font-weight='900' fill='white'>J</text></svg>">

<style>
:root{--bg:#f5f6fa;--surface:#fff;--card:#fff;--card2:#f8f9fc;--border:#e4e7f0;--border2:#d0d5e3;--text:#1a1e2e;--text2:#2d3348;--muted:#6b7194;--dim:#9da3c0;--accent:#3b6de8;--accent-bg:#eef3ff;--gold:#c8910a;--gold-bg:#fff8e6;--green:#1a9a6c;--green-bg:#e8f8f0;--red:#d44040;--red-bg:#fef0f0;--amber:#c07a00;--amber-bg:#fff6e0;--purple:#7044cf;--purple-bg:#f3eeff;--teal:#0d8a8a;--teal-bg:#e6f7f7;--orange:#c05a1a;--orange-bg:#fff3eb;--cyan:#0880a0;--sh:0 1px 3px rgba(0,0,0,.06);--sh2:0 2px 8px rgba(0,0,0,.07);--r:10px;--rs:7px;--rx:5px}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
#hdr{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:stretch;padding:0 16px}
.hd-logo{display:flex;align-items:center;gap:8px;padding-right:16px;border-right:1px solid var(--border);margin-right:12px}.hd-j{width:30px;height:30px;background:linear-gradient(135deg,#f0b429,#e09000);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(200,145,10,.3)}.hd-name{font-size:12px;font-weight:800;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.hd-date{display:flex;align-items:center;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;flex:1}
.hd-tabs{display:flex;align-items:stretch}.hd-tab{display:flex;align-items:center;padding:0 12px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;border-bottom:2.5px solid transparent;transition:all .15s}.hd-tab.active{color:var(--gold);border-bottom-color:var(--gold)}.hd-tab:hover:not(.active){color:var(--text)}
.hd-st{display:flex;align-items:center;font-size:9px;color:var(--dim);margin-left:6px;font-family:'JetBrains Mono',monospace;white-space:nowrap}

.cmd-bar{max-width:1120px;margin:0 auto;padding:12px 16px 0}.cmd-wrap{display:flex;gap:6px;align-items:center;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:5px 7px 5px 14px;box-shadow:var(--sh);transition:border-color .2s}.cmd-wrap:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,145,10,.1)}.cmd-input{flex:1;background:none;border:none;padding:8px 6px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}.cmd-input::placeholder{color:var(--dim)}.cmd-btn{background:linear-gradient(135deg,#f0b429,#d9a020);border:none;border-radius:var(--rs);padding:8px 16px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;white-space:nowrap}.cmd-btn:hover{opacity:.88}.cmd-btn:disabled{opacity:.4;cursor:not-allowed}
.cmd-res{font-size:10px;padding:4px 14px;min-height:18px;font-weight:600}

#main{max-width:1120px;margin:0 auto;padding:10px 16px 40px}
.board-grid{display:grid;grid-template-columns:1fr 350px;gap:14px}@media(max-width:860px){.board-grid{grid-template-columns:1fr}.rpanel{order:-1}}

.health-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.hr-s{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;text-align:center;box-shadow:var(--sh);flex:1;min-width:70px}.hr-l{font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}.hr-v{font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace}.hr-sub{font-size:9px;color:var(--dim)}

.date-nav{display:flex;gap:4px;margin-bottom:14px;align-items:center}.dn-arr{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);width:32px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--muted);flex-shrink:0}.dn-arr:hover{border-color:var(--border2);color:var(--text)}.dn-days{display:flex;gap:4px;flex:1;overflow-x:auto}.dn-d{flex:1;min-width:50px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:5px 4px;text-align:center;cursor:pointer;transition:all .12s;box-shadow:var(--sh)}.dn-d:hover{border-color:var(--border2)}.dn-d.today{border-color:var(--gold);background:var(--gold-bg)}.dn-d.sel{border-color:var(--accent);background:var(--accent-bg)}.dn-d.today.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,145,10,.2)}.dn-dn{font-size:8.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}.dn-d.today .dn-dn{color:var(--gold)}.dn-dnum{font-size:15px;font-weight:800;margin:1px 0}.dn-d.today .dn-dnum{color:var(--gold)}.dn-ev{font-size:7px;color:var(--orange);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:10px;font-weight:600}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}.card-h{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.card-l{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

.slabel{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.todo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:460px){.todo-grid{grid-template-columns:1fr}}
.todo-quad{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh)}
.tq-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 7px;border-bottom:1px solid var(--border)}.tq-t{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}.tq-c{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.tl{padding:4px 8px;flex:1;min-height:70px;max-height:230px;overflow-y:auto}
.ti{display:flex;align-items:flex-start;gap:6px;padding:5px 2px;border-bottom:1px solid #f0f1f6;cursor:grab}.ti:last-child{border-bottom:none}.ti.dragging{opacity:.4}.ti.drag-over{border-top:2px solid var(--accent)}
.tc{width:16px;height:16px;min-width:16px;border:2px solid var(--border2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:9px;font-weight:700;color:#fff;transition:all .15s}.tc.done{background:var(--green);border-color:var(--green)}
.tt{flex:1;font-size:12px;line-height:1.4;word-break:break-word;color:var(--text2)}.tt.done{text-decoration:line-through;color:var(--dim)}
.tm{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:2px}
.td{display:inline-block;font-size:8.5px;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:4px;font-weight:600}.td.overdue{background:var(--red-bg);color:var(--red)}.td.today2{background:var(--amber-bg);color:var(--amber)}.td.soon{background:var(--green-bg);color:var(--green)}.td.future{background:var(--card2);color:var(--muted)}
.tr{font-size:8px;padding:2px 5px;border-radius:4px;background:var(--purple-bg);color:var(--purple);font-weight:600}
.tx{min-width:16px;color:var(--dim);cursor:pointer;font-size:15px;transition:color .1s;margin-top:1px}.tx:hover{color:var(--red)}
.ta{padding:5px 8px 7px;border-top:1px solid var(--border)}.ta-r{display:flex;gap:4px}
.ta-i{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:var(--rx);padding:5px 8px;font-size:11.5px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}.ta-i::placeholder{color:var(--dim)}.ta-i:focus{border-color:var(--accent)}
.btn-p{background:var(--accent);border:none;border-radius:var(--rx);width:28px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}.btn-p:hover{opacity:.85}
.cr{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}.ch{padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:var(--card2);color:var(--dim);font-size:9px;font-weight:600;cursor:pointer;transition:all .12s}.ch.ad.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}.ch.ar.active{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}

.rpanel{display:flex;flex-direction:column;gap:10px}
.at-r{display:flex;align-items:center;gap:8px;margin-bottom:8px}.at-r:last-child{margin-bottom:0}.at-i{font-size:14px;width:22px;text-align:center}.at-n{font-size:11px;font-weight:600;color:var(--text2)}.at-b{flex:1;height:6px;background:var(--card2);border:1px solid var(--border);border-radius:3px;overflow:hidden}.at-f{height:100%;border-radius:3px;transition:width .4s}.at-nu{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);min-width:35px;text-align:right}
.at-pm{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0}.at-pm:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-bg)}

.wk-sug{padding:6px 12px;font-size:11px;color:var(--amber);background:var(--amber-bg);border-bottom:1px solid var(--border)}.wk-bs{padding:7px 10px 3px;display:flex;flex-wrap:wrap;gap:3px}.wk-b{padding:4px 9px;border-radius:var(--rx);border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}.wk-b.sel{background:var(--accent);border-color:var(--accent);color:#fff}.wk-lk{padding:6px 12px;border-top:1px solid var(--border);text-align:center}.wk-lk a{font-size:10px;color:var(--accent);text-decoration:none;font-weight:600;cursor:pointer}
.el{padding:2px 8px 6px}.er{border:1px solid var(--border);border-radius:var(--rs);margin-bottom:3px;overflow:hidden;background:var(--surface)}.eh{display:flex;align-items:center;padding:6px 8px;cursor:pointer;gap:4px}.en{font-size:11.5px;font-weight:600;flex:1;color:var(--text2)}.es{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted)}.ek{font-size:9px;color:var(--dim);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eb{background:var(--card2);border-top:1px solid var(--border);padding:8px 10px}.em{font-size:10px;color:var(--teal);font-weight:600;margin-bottom:5px}.esl{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:6px 0 3px}.est{font-size:10.5px;line-height:1.5;color:var(--text2);padding:2px 0 2px 9px;border-left:2px solid var(--accent);margin-bottom:2px}.emk{font-size:10px;color:var(--amber);padding:2px 0 2px 9px;border-left:2px solid var(--amber);margin-bottom:2px}.epg{font-size:10px;color:var(--green);padding:2px 0 2px 9px;border-left:2px solid var(--green)}.ert{font-size:9px;color:var(--dim);margin-top:4px;font-family:'JetBrains Mono',monospace}
.ev{display:inline-flex;align-items:center;gap:3px;margin-top:5px;padding:3px 8px;background:var(--red-bg);border:1px solid #e8b0b0;border-radius:var(--rx);font-size:9px;font-weight:600;color:var(--red);text-decoration:none}.ev:hover{opacity:.8}
.we{text-align:center;padding:14px;color:var(--dim);font-size:11px}

.nb{display:flex;gap:10px;padding:8px 12px}.ng{flex:1}.nl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:2px;font-weight:600}.nbb{height:6px;background:var(--card2);border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:2px}.nbf{height:100%;border-radius:3px;transition:width .4s}.nn{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}.nn b{color:var(--text)}
.nm{padding:0 10px;max-height:140px;overflow-y:auto}.nmi{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid #f0f1f6}.nmi:last-child{border-bottom:none}.nmn{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}.nmm{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap}.nmd{color:var(--dim);cursor:pointer;font-size:13px}.nmd:hover{color:var(--red)}
.nia{padding:6px 10px 8px;border-top:1px solid var(--border)}.nir{display:flex;gap:4px;position:relative}
.ni{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:var(--rx);padding:5px 8px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}.ni::placeholder{color:var(--dim)}.ni:focus{border-color:var(--green)}
.bl{background:var(--green);border:none;border-radius:var(--rx);padding:5px 10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}.bl:hover{opacity:.88}.bl:disabled{opacity:.4}
.bc{background:var(--card2);border:1.5px solid var(--border);border-radius:var(--rx);padding:5px 8px;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center}.bc:hover{border-color:var(--green);color:var(--green)}
.nsg{position:absolute;left:0;right:60px;top:100%;background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--rx) var(--rx);max-height:140px;overflow-y:auto;z-index:99;box-shadow:var(--sh2)}.nsi{padding:5px 10px;cursor:pointer;font-size:11px;display:flex;justify-content:space-between}.nsi:hover{background:var(--green-bg)}.nsm{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px}
.nh{font-size:9px;color:var(--dim);margin-top:3px}

.nutri-tab{max-width:800px;margin:0 auto}.ns{display:flex;gap:8px;margin-bottom:14px}.ns input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;box-shadow:var(--sh)}.ns input:focus{border-color:var(--green)}
.ng2{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.nc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;box-shadow:var(--sh);position:relative}.nc:hover{box-shadow:var(--sh2)}
.ncc{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:4px}.ncn{font-size:13px;font-weight:600;margin-bottom:4px;padding-right:20px}.ncm{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted)}
.nca{position:absolute;top:8px;right:8px;display:flex;gap:2px}.ncb{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}.ncb:hover{border-color:var(--accent);color:var(--accent)}.ncb.del:hover{border-color:var(--red);color:var(--red)}
.nad{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:var(--sh)}.nar{display:flex;gap:6px;flex-wrap:wrap;align-items:end}.naf{display:flex;flex-direction:column;gap:2px}.naf label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}.naf input,.naf select{background:var(--card2);border:1px solid var(--border);border-radius:var(--rx);padding:6px 8px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}.naf input:focus,.naf select:focus{border-color:var(--green)}

.ct-top{display:flex;gap:8px;margin-bottom:14px}.ct-in{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;box-shadow:var(--sh)}.ct-in::placeholder{color:var(--dim)}.ct-in:focus{border-color:var(--gold)}
.bg{background:linear-gradient(135deg,#f0b429,#d9a020);border:none;border-radius:var(--r);padding:10px 16px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:opacity .15s}.bg:hover{opacity:.88}.bg:disabled{opacity:.4}
.cf{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}.fp{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:10.5px;font-weight:600;cursor:pointer;transition:all .15s}.fp.active{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.cc{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:11px;position:relative;box-shadow:var(--sh)}.cc:hover{box-shadow:var(--sh2)}.cc.done{opacity:.4;border-style:dashed}
.cb{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:8.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}.cb.podcast{background:var(--purple-bg);color:var(--purple)}.cb.film{background:var(--accent-bg);color:var(--accent)}.cb.tv{background:var(--teal-bg);color:var(--teal)}.cb.book{background:var(--amber-bg);color:var(--amber)}
.ctl{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:6px;padding-right:16px}.cft{display:flex;align-items:center;gap:4px}
.cw{font-size:8.5px;padding:2px 6px;border-radius:4px;font-weight:600}.cw.katie{background:var(--orange-bg);color:var(--orange)}.cw.solo{background:var(--green-bg);color:var(--green)}
.cd{margin-left:auto;font-size:9px;padding:2px 8px;border-radius:4px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600}.cd:hover{background:var(--green);color:#fff;border-color:var(--green)}
.cdl{position:absolute;top:8px;right:8px;color:var(--dim);cursor:pointer;font-size:13px}.cdl:hover{color:var(--red)}

.wo-tab{max-width:720px;margin:0 auto}.wo-ps{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}.wo-pg{display:flex;gap:4px;flex-wrap:wrap;align-items:center}.wo-pl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);min-width:90px}
.wo-pb{padding:6px 12px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;box-shadow:var(--sh)}.wo-pb.sel{color:#fff}.wo-pb:hover:not(.sel){border-color:var(--border2);color:var(--text)}

function pkK(){const w=wkN();return w<=3?'foundation':w<=7?'rampingUp':w<=12?'fullVolume':'peak'}
function ph(){const w=wkN(),p=pkK(),L={foundation:'Foundation',rampingUp:'Ramping Up',fullVolume:'Full Volume',peak:'Peak'};return{l:`Wk ${w} · ${L[p]}`,keys:PM[p],pk:p}}

function fDue(ds){if(!ds)return null;const diff=Math.round((new Date(ds+'T00:00:00')-new Date(TK+'T00:00:00'))/864e5);if(diff<0)return{l:'Overdue',c:'overdue'};if(diff===0)return{l:'Today',c:'today2'};if(diff===1)return{l:'Tomorrow',c:'today2'};if(diff<=3)return{l:new Date(ds+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short'}),c:'soon'};return{l:new Date(ds+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}),c:'future'}}

function gWk(off){const d=new Date(NOW);d.setDate(d.getDate()+(off||0)*7);const dow=d.getDay();d.setDate(d.getDate()+(dow===0?-6:1-dow));return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x})}

// Food-related words (signals → meal)
const FOOD_WORDS=/\b(chicken|fish|salmon|steak|burger|pizza|pasta|rice|eggs|toast|porridge|shake|protein|yoghurt|banana|apple|soup|salad|wrap|curry|fajita|sandwich|cereal|latte|coffee|beer|wine|pint|chips|nuts|chocolate|bar|oats|pie|fishcake|jerky|sweet potato)\b/i;
// Task-related words (signals → todo)
const TASK_WORDS=/\b(buy|call|book|fix|clean|email|send|remind|order|cancel|check|schedule|research|organise|organize|arrange|pick up|wash|repair|install|replace|move|sort|tidy|vacuum|hoover|iron|mow|paint|get|make|return|post|collect|drop off|set up|look into|find|plan|prepare|register|sign up|renew|review|update|submit|chase|follow up)\b/i;

function parseCmd(txt){
  const l=txt.toLowerCase();
  // Activity — explicit logging
  if(/\bhockey\b/i.test(txt)&&!/\bhockey dinner\b/i.test(txt))return{action:'activity',type:'hockey'};
  if(/\b(did|done|played|went|completed|finished|logged)\b/i.test(txt)){
    if(/\bgym|weights|workout\b/i.test(txt))return{action:'activity',type:'gym'};
    if(/\bpark|run|jog\b/i.test(txt))return{action:'activity',type:'park'};
    if(/\bgolf\b/i.test(txt))return{action:'activity',type:'golf'};
  }
  // Weight update
  if(/\b(weigh|weight)\b/i.test(txt)){const m=txt.match(/(\d+\.?\d*)\s*kg/i)||txt.match(/(\d+\.?\d*)/);if(m)return{action:'weight',value:parseFloat(m[1])}}
  // Content
  for(const[kw,type]of[['podcast','podcast'],['film','film'],['movie','film'],['tv show','tv'],['tv series','tv'],['book','book'],['audiobook','book']]){
    if(l.includes(kw)){let title=txt.replace(new RegExp('\\b'+kw+'\\b','gi'),'').replace(/,/g,' ').replace(/\b(with\s+)?katie\b/gi,'').replace(/\s{2,}/g,' ').trim();return{action:'content',title:title||txt,type,withKatie:/katie/i.test(txt)}}
  }
  if(l.includes('tv')&&!TASK_WORDS.test(l)){let title=txt.replace(/\btv\b/gi,'').replace(/,/g,' ').replace(/\b(with\s+)?katie\b/gi,'').replace(/\s{2,}/g,' ').trim();return{action:'content',title:title||txt,type:'tv',withKatie:/katie/i.test(txt)}}
  // Smart date
  function smartDate(){
    if(/\btoday\b/.test(l))return TK;if(/\btomorrow\b|\btmrw\b/.test(l))return dOff(1);
    const days=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    for(let i=0;i<7;i++){if(l.includes(days[i])||l.includes(days[i].substr(0,3))){let d=i-NOW.getDay();if(d<=0)d+=7;if(/\bnext\b/.test(l))d+=7;return dOff(d)}}return null}
  // Check: is this food or a task?
  const isFood=FOOD_WORDS.test(l);
  const isTask=TASK_WORDS.test(l);
  if(isTask&&!isFood){
    // It's a todo
    const catH={health:['vitamin','supplement','doctor','dentist','prescription','mounjaro','injection','gym','weigh'],house:['fix','clean','paint','garden','plumber','electrician','shower','kitchen','roof','floor','diy','mow','hoover','tidy','iron','wash'],work:['email','cv','linkedin','meeting','report','job','interview','contract'],life:['buy','call','birthday','gift','plan','book','dinner','lunch','pub']};
    let cat='life';for(const[c,hints]of Object.entries(catH))if(hints.some(h=>l.includes(h))){cat=c;break}
    const due=smartDate();
    let clean=txt.replace(/\b(today|tomorrow|tmrw|next\s+\w+day|monday|tuesday|wednesday|thursday|friday|saturday|sunday|mon|tue|wed|thu|fri|sat|sun)\b/gi,'').replace(/,\s*/g,' ').replace(/\s{2,}/g,' ').trim();
    return{action:'todo',text:clean||txt,category:cat,dueDate:due}
  }
  if(isFood){
    return{action:'meal',food:txt}
  }
  // Check food library
  const foodMatch=S.foods.find(f=>l.includes(f.name.toLowerCase().split('(')[0].trim().toLowerCase()));
  if(foodMatch)return{action:'meal',food:txt};
  // Default: todo (safer than meal)
  const due=smartDate();
  let clean=txt.replace(/\b(today|tomorrow|tmrw|next\s+\w+day|monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/gi,'').replace(/,\s*/g,' ').replace(/\s{2,}/g,' ').trim();
  return{action:'todo',text:clean||txt,category:'life',dueDate:due}
}

  if(!txt)return;btn.disabled=true;btn.textContent='...';res.textContent='';res.style.color='var(--green)';

  else if(cmd.action==='meal'){

    const today=S.nutrition[S.selDate]||{meals:[],targets:{cals:2000,protein:150}};
    if(match){today.meals.push({id:uid(),name:match.name,cals:match.cals,protein:match.protein,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});S.nutrition[S.selDate]=today;qS();renderNut();res.textContent=`✓ Logged: ${match.name} (${match.cals}kcal, ${match.protein}g)`;inp.value=''}
    else{
      let meal;try{const r=await callAI('UK nutrition expert. ONLY JSON: {"name":"short","cals":number,"protein":number}. UK portions.',txt);if(r)meal=JSON.parse(r.trim().replace(/```json?|```/g,'').trim())}catch(e){}

      meal.id=uid();meal.time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});today.meals.push(meal);S.nutrition[S.selDate]=today;qS();renderNut();res.textContent=`✓ Logged: ${meal.name} (${meal.cals}kcal, ${meal.protein}g)`;inp.value=''}
  }
  else if(cmd.action==='todo'){S.todos.push({id:uid(),category:cmd.category,text:cmd.text,dueDate:cmd.dueDate||null,completed:false,createdAt:new Date().toISOString()});qS();renderTodos();res.textContent=`✓ Todo (${cmd.category}): ${cmd.text}`;inp.value=''}
  else if(cmd.action==='content'){S.content.unshift({id:uid(),title:cmd.title,type:cmd.type,withKatie:cmd.withKatie||false,watched:false,addedAt:new Date().toISOString()});qS();renderCt();res.textContent=`✓ Content: ${cmd.title} (${cmd.type})`;inp.value=''}
  else if(cmd.action==='activity'){const a=S.activities[TK]||[];a.push({type:cmd.type,time:new Date().toISOString()});S.activities[TK]=a;qS();renderAT();res.textContent=`✓ Logged: ${cmd.type} session`;inp.value=''}
  btn.disabled=false;btn.textContent='Go';
}

function setChip(cat,days){S.dateSel[cat]=S.dateSel[cat]===days?null:days;document.querySelectorAll(`.ch.ad[data-c="${cat}"]`).forEach(el=>el.classList.toggle('active',parseInt(el.dataset.d)===S.dateSel[cat]))}
function setRec(cat,type){S.recMode[cat]=S.recMode[cat]===type?null:type;document.querySelectorAll(`.ch.ar[data-c="${cat}"]`).forEach(el=>el.classList.toggle('active',el.dataset.t===S.recMode[cat]))}
function addTF(cat){const t=document.getElementById('ti-'+cat),text=t.value.trim();if(!text)return;const ds=S.dateSel[cat]!=null?dOff(S.dateSel[cat]):null;const rt=S.recMode[cat]||null;S.todos.push({id:uid(),category:cat,text,dueDate:ds,completed:false,createdAt:new Date().toISOString(),recurType:rt});if(rt)S.recDefs.push({id:'r'+uid(),text,category:cat,recurType:rt});qS();t.value='';S.dateSel[cat]=null;S.recMode[cat]=null;renderTodos()}
function togT(id){const t=S.todos.find(x=>x.id===id);if(t){t.completed=!t.completed;qS();renderTodos()}}
function delT(id){const t=S.todos.find(x=>x.id===id);if(t&&t.recurId)S.recDefs=S.recDefs.filter(r=>r.id!==t.recurId);S.todos=S.todos.filter(x=>x.id!==id);qS();renderTodos()}
function dS(e,id,cat){drag={id,cat};e.target.closest('.ti').classList.add('dragging')}
function dE(e){e.target.closest('.ti')?.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'))}
function dO(e,id,cat){e.preventDefault();if(drag.cat!==cat)return;document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));e.currentTarget.classList.add('drag-over')}
function dR(e,tid,cat){e.preventDefault();document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));if(drag.cat!==cat||drag.id===tid)return;const ci=S.todos.filter(t=>t.category===cat),oi=S.todos.filter(t=>t.category!==cat),di=ci.findIndex(t=>t.id===drag.id),ri=ci.findIndex(t=>t.id===tid);if(di<0||ri<0)return;const[item]=ci.splice(di,1);ci.splice(ri,0,item);S.todos=[...oi,...ci];qS();renderTodos()}

function logAct(type){const a=S.activities[TK]||[];a.push({type,time:new Date().toISOString()});S.activities[TK]=a;qS();renderAT()}
function rmAct(type){const a=S.activities[TK]||[];const i=[...a].reverse().findIndex(x=>x.type===type);if(i>=0){a.splice(a.length-1-i,1);S.activities[TK]=a;qS();renderAT()}}
function editLbl(k){const nv=prompt('Label:',S.weekLabels[k]||'');if(nv!==null){if(nv.trim())S.weekLabels[k]=nv.trim();else delete S.weekLabels[k];qS();renderDN()}}
function selD(d){S.selDate=d;renderDN();renderNut()}
function navW(dir){S.weekOff+=dir;renderDN()}
function updW(v){const n=parseFloat(v);if(!isNaN(n)&&n>50&&n<200){S.curWeight=n;qS();renderHR()}}

// ===== NUTRITION TAB =====
function renderNT(){
  const s=S.nSearch||'';let items=S.foods;if(s)items=items.filter(f=>f.name.toLowerCase().includes(s.toLowerCase()));
  const cc={breakfast:'var(--amber)',lunch:'var(--green)',dinner:'var(--accent)',snack:'var(--purple)',supplement:'var(--teal)',protein:'var(--red)',drink:'var(--cyan)',side:'var(--muted)'};
  document.getElementById('nt').innerHTML=`<h2 style="font-size:20px;font-weight:800;margin-bottom:4px">Food Library</h2><p style="color:var(--muted);font-size:12px;margin-bottom:14px">${S.foods.length} items · Add, edit, or search</p>
  <div class="nad"><div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Add New Food</div><div class="nar"><div class="naf" style="flex:2"><label>Name</label><input id="nfn" placeholder="e.g. Chicken wrap"></div><div class="naf" style="flex:1"><label>Calories</label><input id="nfc" type="number" placeholder="450"></div><div class="naf" style="flex:1"><label>Protein (g)</label><input id="nfp" type="number" placeholder="30"></div><div class="naf"><label>Category</label><select id="nfk"><option value="breakfast">Breakfast</option><option value="lunch">Lunch</option><option value="dinner" selected>Dinner</option><option value="snack">Snack</option><option value="supplement">Supplement</option><option value="drink">Drink</option><option value="side">Side</option></select></div><button class="btn-p" style="height:34px;align-self:end;background:var(--green);width:auto;padding:0 12px;font-size:12px" onclick="addFd()">+ Add</button></div></div>
  <div class="ns"><input placeholder="Search foods..." value="${E(s)}" oninput="S.nSearch=this.value;renderNT()"></div>
  <div class="ng2">${items.map(f=>`<div class="nc"><div class="nca"><button class="ncb" onclick="editFd('${f.id}')">✎</button><button class="ncb del" onclick="delFd('${f.id}')">×</button></div><div class="ncc" style="background:${(cc[f.cat]||'var(--muted)')}15;color:${cc[f.cat]||'var(--muted)'}">${f.cat}</div><div class="ncn">${E(f.name)}</div><div class="ncm">${f.cals} kcal · ${f.protein}g protein</div></div>`).join('')}</div>`}
function addFd(){const n=document.getElementById('nfn').value.trim(),c=parseInt(document.getElementById('nfc').value),p=parseInt(document.getElementById('nfp').value),k=document.getElementById('nfk').value;if(!n||isNaN(c))return;S.foods.push({id:'f_'+uid(),name:n,cals:c,protein:p||0,cat:k});qS();document.getElementById('nfn').value='';document.getElementById('nfc').value='';document.getElementById('nfp').value='';renderNT()}
function editFd(id){const f=S.foods.find(x=>x.id===id);if(!f)return;const n=prompt('Name:',f.name);if(!n)return;const c=parseInt(prompt('Calories:',f.cals)),p=parseInt(prompt('Protein:',f.protein));if(!isNaN(c))f.cals=c;if(!isNaN(p))f.protein=p;f.name=n;qS();renderNT()}
function delFd(id){if(!confirm('Delete?'))return;S.foods=S.foods.filter(f=>f.id!==id);qS();renderNT()}

// ===== RENDER =====
function renderHdr(){document.getElementById('hd-date').textContent=NOW.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function renderHR(){document.getElementById('hr').innerHTML=`<div class="hr-s"><div class="hr-l">Week</div><div class="hr-v" style="color:var(--teal)">${wkN()}/29</div><div class="hr-sub">${ph().l.split('·')[1]?.trim()||''}</div></div><div class="hr-s"><div class="hr-l">Mounjaro</div><div class="hr-v" style="color:var(--purple)">${dose()}</div><div class="hr-sub">Weekly jab</div></div><div class="hr-s"><div class="hr-l">Lost</div><div class="hr-v" style="color:var(--green)">${lost()}kg</div><div class="hr-sub">${pctL()}% of target</div></div><div class="hr-s"><div class="hr-l">Days Left</div><div class="hr-v" style="color:var(--orange)">${dLeft()}</div><div class="hr-sub">Until 1 Nov</div></div>`}
function renderDN(){const days=gWk(S.weekOff);document.getElementById('dn').innerHTML=`<button class="dn-arr" onclick="navW(-1)">←</button><div class="dn-days">${days.map(d=>{const k=fmt(d),isT=k===TK,isSel=k===S.selDate,ev=CAL[k]||'';return`<div class="dn-d${isT?' today':''}${isSel?' sel':''}" onclick="selD('${k}')"><div class="dn-dn">${d.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase()}</div><div class="dn-dnum">${d.getDate()}</div><div class="dn-ev">${E(ev)}</div></div>`}).join('')}</div><button class="dn-arr" onclick="navW(1)">→</button>`}
function renderAT(){const p=ph(),tg=PT[p.pk],dn=wActs();const rows=[{i:'🏋️',n:'Gym',k:'gym',d:dn.gym,t:tg.gym.t,mn:tg.gym.min,c:'var(--accent)'},{i:'🏃',n:'Park',k:'park',d:dn.park,t:tg.park.t,mn:tg.park.min,c:'var(--green)'},{i:'⛳',n:'Golf',k:'golf',d:dn.golf,t:tg.golf.t,mn:tg.golf.min,c:'var(--teal)'},{i:'🏑',n:'Hockey',k:'hockey',d:dn.hockey,t:tg.hockey.t,mn:tg.hockey.min,c:'var(--orange)'}];const total=dn.gym+dn.park+dn.golf+dn.hockey,totalT=tg.gym.t+tg.park.t+tg.golf.t+tg.hockey.t;
document.getElementById('ac').innerHTML=`<div class="card-h"><span class="card-l" style="color:var(--teal)">This Week</span><span style="font-size:11px;color:var(--muted);font-weight:600">${total}/${totalT}</span></div><div style="padding:10px 12px">${rows.map(r=>{const pct=r.t?Math.min(100,Math.round(r.d/Math.max(r.t,1)*100)):r.d?100:0;return`<div class="at-r"><div class="at-i">${r.i}</div><div style="flex:1"><div class="at-n">${r.n}</div><div style="display:flex;align-items:center;gap:6px;margin-top:2px"><div class="at-b"><div class="at-f" style="width:${pct}%;background:${r.c}"></div></div><div class="at-nu"><b style="color:${r.d>=r.mn?'var(--green)':'var(--text)'};">${r.d}</b>/${r.t}</div></div></div><div style="display:flex;gap:2px"><button class="at-pm" onclick="rmAct('${r.k}')">−</button><button class="at-pm" onclick="logAct('${r.k}')">+</button></div></div>`}).join('')}</div>`}
function renderTodos(){const sv={};CATS.forEach(c=>{const el=document.getElementById('ti-'+c.k);if(el)sv[c.k]=el.value});
document.getElementById('tg').innerHTML=CATS.map(cat=>{const items=S.todos.filter(t=>t.category===cat.k),active=items.filter(t=>!t.completed).length,ds=S.dateSel[cat.k],rm=S.recMode[cat.k];
return`<div class="todo-quad"><div class="tq-hd"><span class="tq-t" style="color:${cat.c}">${cat.i} ${cat.l}</span><span class="tq-c">${active}</span></div>
<div class="tl">${items.length?items.map(t=>{const due=t.dueDate?fDue(t.dueDate):null;return`<div class="ti" draggable="true" ondragstart="dS(event,'${t.id}','${cat.k}')" ondragend="dE(event)" ondragover="dO(event,'${t.id}','${cat.k}')" ondrop="dR(event,'${t.id}','${cat.k}')"><div class="tc${t.completed?' done':''}" onclick="togT('${t.id}')">${t.completed?'✓':''}</div><div style="flex:1;min-width:0"><div class="tt${t.completed?' done':''}">${E(t.text)}</div><div class="tm">${due?`<span class="td ${due.c}">${due.l}</span>`:''}${t.recurType?`<span class="tr">🔄 ${t.recurType}</span>`:''}</div></div><div class="tx" onclick="delT('${t.id}')">×</div></div>`}).join(''):'<div class="empty">Nothing yet</div>'}</div>
<div class="ta"><div class="ta-r"><input class="ta-i" id="ti-${cat.k}" placeholder="Add task..." onkeydown="if(event.key==='Enter')addTF('${cat.k}')"><button class="btn-p" onclick="addTF('${cat.k}')">+</button></div>
<div class="cr"><button class="ch ad${ds===0?' active':''}" data-c="${cat.k}" data-d="0" onclick="setChip('${cat.k}',0)">Today</button><button class="ch ad${ds===1?' active':''}" data-c="${cat.k}" data-d="1" onclick="setChip('${cat.k}',1)">Tmrw</button><button class="ch ad${ds===3?' active':''}" data-c="${cat.k}" data-d="3" onclick="setChip('${cat.k}',3)">+3d</button><button class="ch ad${ds===7?' active':''}" data-c="${cat.k}" data-d="7" onclick="setChip('${cat.k}',7)">+7d</button><span style="width:1px;background:var(--border);margin:0 1px"></span><button class="ch ar${rm==='daily'?' active':''}" data-c="${cat.k}" data-t="daily" onclick="setRec('${cat.k}','daily')">🔄 Daily</button><button class="ch ar${rm==='weekly'?' active':''}" data-c="${cat.k}" data-t="weekly" onclick="setRec('${cat.k}','weekly')">🔄 Weekly</button></div></div></div>`}).join('');
CATS.forEach(c=>{const el=document.getElementById('ti-'+c.k);if(el&&sv[c.k])el.value=sv[c.k]})}

function selWO(key){S.todayWO=key;S.expEx=null;qS();renderWO()}
function togEx(i){S.expEx=S.expEx===i?null:i;renderWO()}
function renderWO(){const p=ph(),dow=NOW.getDay(),sug=PS[p.pk][dow===0?6:dow-1]||'Rest';
document.getElementById('wp').textContent=p.l;document.getElementById('ws').innerHTML=`💡 Suggested: <b>${sug}</b>`;
document.getElementById('wb').innerHTML=p.keys.map(k=>`<button class="wk-b${S.todayWO===k?' sel':''}" onclick="selWO('${k}')">${WO[k]?.name||k}</button>`).join('');
const body=document.getElementById('wbody');if(!S.todayWO){body.innerHTML='<div class="we">Select above</div>';return}
if(S.todayWO==='rest'){body.innerHTML='<div class="we" style="color:var(--teal)">Rest day 💤</div>';return}
const wo=WO[S.todayWO];if(!wo||!wo.ex.length){body.innerHTML='<div class="we">Active session</div>';return}
const warm=`<div class="er"><div class="eh" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'"><div class="en" style="color:var(--amber)">🔥 Warm-Up</div><div class="es" style="color:var(--amber)">5-8m</div></div><div style="display:none;background:var(--card2);border-top:1px solid var(--border);padding:6px 8px">${WU.map(w=>`<div class="est">${E(w.e)} — <span style="color:var(--muted)">${E(w.n)}</span></div>`).join('')}</div></div>`;
const cool=`<div class="er"><div class="eh" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'"><div class="en" style="color:var(--cyan)">❄️ Cool-Down</div><div class="es" style="color:var(--cyan)">8m</div></div><div style="display:none;background:var(--card2);border-top:1px solid var(--border);padding:6px 8px">${CD.map(w=>`<div class="est">${E(w.e)} — <span style="color:var(--muted)">${E(w.n)}</span></div>`).join('')}</div></div>`;
const exs=wo.ex.map((ex,i)=>{const open=S.expEx===i,vL=vidLink(ex.n);return`<div class="er"><div class="eh" onclick="togEx(${i})"><div class="en">${E(ex.n)}</div><div class="es">${E(ex.s)}</div><div class="ek">${E(ex.w)}</div><span style="font-size:9px;color:var(--dim)">${open?'▲':'▼'}</span></div>${open?`<div class="eb fade-in"><div class="em">⚡ ${E(ex.m)}</div><div class="esl">Form</div>${ex.f.map((f,fi)=>`<div class="est"><span style="color:var(--accent);font-weight:700;margin-right:3px">${fi+1}.</span> ${E(f)}</div>`).join('')}${ex.x?.length?`<div class="esl">Watch Out</div>${ex.x.map(m=>`<div class="emk">⚠ ${E(m)}</div>`).join('')}`:''}${ex.p?`<div class="esl">Progress</div><div class="epg">📈 ${E(ex.p)}</div>`:''}<div class="ert">⏱ ${E(ex.r)}</div><a class="ev" href="${vL}" target="_blank">▶ Form video</a></div>`:''}</div>`}).join('');
body.innerHTML=`<div class="el">${warm}${exs}${cool}</div>`}

function renderNut(){const dk=S.selDate,today=S.nutrition[dk]||{meals:[],targets:{cals:2000,protein:150}},tC=today.targets?.cals||2000,tP=today.targets?.protein||150,cals=today.meals.reduce((s,m)=>s+(m.cals||0),0),prot=today.meals.reduce((s,m)=>s+(m.protein||0),0),cP=Math.min(100,Math.round(cals/tC*100)),pP=Math.min(100,Math.round(prot/tP*100)),cCol=cals>tC*1.05?'var(--red)':'var(--amber)';
const dl=dk===TK?'Today':new Date(dk+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
document.getElementById('nd').textContent=dl;
document.getElementById('nbars').innerHTML=`<div class="ng"><div class="nl">Calories</div><div class="nbb"><div class="nbf" style="width:${cP}%;background:${cCol}"></div></div><div class="nn"><b>${cals}</b> / ${tC}</div></div><div class="ng"><div class="nl">Protein</div><div class="nbb"><div class="nbf" style="width:${pP}%;background:var(--cyan)"></div></div><div class="nn"><b>${prot}g</b> / ${tP}g</div></div>`;
document.getElementById('nmeals').innerHTML=today.meals.length?today.meals.map(m=>`<div class="nmi"><div style="flex:1;min-width:0"><div class="nmn">${m.photo?'📷 ':''}${E(m.name)}</div><div style="font-size:8px;color:var(--dim);font-family:'JetBrains Mono',monospace">${E(m.time||'')}</div></div><div class="nmm">${m.cals}kcal·${m.protein}g</div><div class="nmd" onclick="delMeal('${m.id}')">×</div></div>`).join(''):'<div class="empty">No meals logged</div>'}

function renderCt(){document.getElementById('cfl').innerHTML=CF.map(f=>`<button class="fp${S.cFilter===f.k?' active':''}" onclick="S.cFilter='${f.k}';renderCt()">${f.l}</button>`).join('');
let items=S.content;const f=S.cFilter;if(f==='podcast')items=items.filter(x=>x.type==='podcast');else if(f==='film')items=items.filter(x=>x.type==='film');else if(f==='tv')items=items.filter(x=>x.type==='tv');else if(f==='book')items=items.filter(x=>x.type==='book');else if(f==='solo')items=items.filter(x=>!x.withKatie&&!x.watched);else if(f==='katie')items=items.filter(x=>x.withKatie&&!x.watched);else if(f==='done')items=items.filter(x=>x.watched);else items=items.filter(x=>!x.watched);
const ic={podcast:'🎙',film:'🎬',tv:'📺',book:'📖'};
document.getElementById('cgr').innerHTML=items.length?items.map(item=>`<div class="cc${item.watched?' done':''}"><div class="cdl" onclick="delCt('${item.id}')">×</div><div class="cb ${item.type}">${ic[item.type]||''} ${item.type}</div><div class="ctl">${E(item.title)}</div><div class="cft"><span class="cw ${item.withKatie?'katie':'solo'}">${item.withKatie?'❤️ Katie':'👤 Solo'}</span><button class="cd" onclick="togCt('${item.id}')">${item.watched?'↩':'✓'}</button></div></div>`).join(''):'<div class="empty" style="grid-column:1/-1">Nothing here</div>'}

// WORKOUT TAB
function sWT(k){S.woTab=k;S.woTabEx=null;renderWT()}
function tWE(i){S.woTabEx=S.woTabEx===i?null:i;renderWT()}
function renderWT(){const wo=WO[S.woTab];if(!wo)return;const groups=[{l:'Wks 1-3',keys:['fullA','fullB'],c:'#3b6de8'},{l:'Wks 4-7',keys:['upper','lower'],c:'#7044cf'},{l:'Wks 8+',keys:['push','pull','legs'],c:'#1a9a6c'},{l:'Active',keys:['park','golf'],c:'#0d8a8a'}];
const sel=groups.map(g=>`<div class="wo-pg"><span class="wo-pl">${g.l}</span>${g.keys.map(k=>`<button class="wo-pb${S.woTab===k?' sel':''}" style="${S.woTab===k?`background:${g.c};border-color:${g.c}`:''}" onclick="sWT('${k}')">${WO[k]?.name||k}</button>`).join('')}</div>`).join('');
const hdr=`<div class="wo-hd"><div class="wo-ti" style="color:${wo.color}">${wo.name}</div><div class="wo-mt">${wo.phase} · ${wo.time} · ${wo.ex.length} exercise${wo.ex.length!==1?'s':''}</div></div>`;
let ws='',cs='';if(wo.ex.length&&S.woTab!=='golf'&&S.woTab!=='park'){ws=`<div class="wo-sh" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'"><span style="font-weight:700;color:var(--amber)">🔥 Warm-Up (5-8m)</span><span style="color:var(--muted);font-size:11px">▼</span></div><div style="display:none;padding:4px 0;margin-bottom:6px">${WU.map(w=>`<div style="padding:4px 14px;font-size:12px"><b>${w.e}</b> — <span style="color:var(--muted)">${w.n}</span></div>`).join('')}</div>`;cs=`<div class="wo-sh" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'"><span style="font-weight:700;color:var(--cyan)">❄️ Cool-Down (8m)</span><span style="color:var(--muted);font-size:11px">▼</span></div><div style="display:none;padding:4px 0">${CD.map(w=>`<div style="padding:4px 14px;font-size:12px"><b>${w.e}</b> — <span style="color:var(--muted)">${w.n}</span></div>`).join('')}</div>`}
const exs=wo.ex.map((ex,i)=>{const open=S.woTabEx===i,vL=vidLink(ex.n);return`<div class="wo-ec"><div class="wo-eh" onclick="tWE(${i})"><div class="wo-en" style="background:${wo.color}">${i+1}</div><div style="flex:1"><div class="wo-enm">${E(ex.n)}</div><div class="wo-eq">${E(ex.s)} · ${E(ex.w)} · Rest ${E(ex.r)}</div></div><span style="color:var(--muted);font-size:11px">${open?'▲':'▼'}</span></div>${open?`<div class="wo-eb fade-in"><div style="font-size:13px;color:var(--teal);font-weight:600;margin-bottom:8px">⚡ ${E(ex.m)}</div><div class="wo-sc">Form</div>${ex.f.map((f,fi)=>`<div class="wo-st"><span style="color:var(--accent);font-weight:700;margin-right:5px">${fi+1}.</span>${E(f)}</div>`).join('')}${ex.x?.length?`<div class="wo-sc">Mistakes</div>${ex.x.map(m=>`<div class="wo-mk">⚠ ${E(m)}</div>`).join('')}`:''}${ex.p?`<div class="wo-sc">Progress</div><div style="font-size:12px;color:var(--green);padding:5px 12px;border-left:3px solid var(--green)">📈 ${E(ex.p)}</div>`:''}<div class="wo-rt">⏱ Rest: ${E(ex.r)}</div><a class="ev" href="${vL}" target="_blank" style="margin-top:8px;font-size:10px">▶ Form video on YouTube</a></div>`:''}</div>`}).join('');
document.getElementById('wot').innerHTML=`<div class="wo-ps">${sel}</div>${hdr}${ws}${exs}${cs}`}

function switchTab(tab){['life','workouts','nutrition','content'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'block':'none');document.querySelectorAll('.hd-tab').forEach((el,i)=>el.classList.toggle('active',['life','workouts','nutrition','content'][i]===tab));if(tab==='workouts')renderWT();if(tab==='nutrition')renderNT()}

function renderAll(){renderHdr();renderHR();renderDN();renderAT();renderTodos();renderWO();renderNut();renderCt()}

// INIT
renderAll();
loadState();
</script>
</body>
</html>
